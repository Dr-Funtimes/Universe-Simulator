<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universe Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }
#ui { position: fixed; bottom: 0; left: 0; right: 0; background: #040810; border-top: 1px solid #1a2a40; padding: 5px 10px; font: 11px monospace; color: #adf; display: flex; flex-direction: column; gap: 4px; }
.row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
button { font: 11px monospace; padding: 2px 8px; background: #0c1828; color: #8ab; border: 1px solid #1e3050; border-radius: 3px; cursor: pointer; }
button:hover { background: #162540; color: #cef; }
button.on { color: #6df; border-color: #2a6fcc; background: #0a1f40; }
input[type=range] { width: 60px; vertical-align: middle; cursor: pointer; }
.val { color: #9cf; min-width: 18px; display: inline-block; }
#hud { font-size: 10px; color: #345; display: flex; gap: 10px; flex-wrap: wrap; }
#hud span { color: #8cf; }
#elog { font-size: 10px; min-height: 13px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <div id="hud">
      bodies:<span id="hB">0</span> time:<span id="hT">0</span>
      merges:<span id="hM">0</span> anni:<span id="hA">0</span>
      eaten:<span id="hE">0</span> nova:<span id="hN">0</span>
      fps:<span id="hF">0</span>
    </div>
    <div id="elog"></div>
  </div>
  <div class="row">
    <button id="btnBang">&#128165; Big Bang</button>
    <button id="btnGalaxy">&#127757; Galaxy</button>
    <button id="btnCollide">&#128259; Galaxy Collision</button>
    <button id="btnNova">&#10024; Supernova</button>
    <button id="btnQuasar">&#128161; Quasar</button>
    <button id="btnBH">&#9679; Black Hole</button>
    <button id="btnMagnetar">&#9889; Magnetar</button>
    <button id="btnWD">&#11088; White Dwarf</button>
    <button id="btnComet">&#9732; Comets</button>
    <button id="btnRogue">&#127774; Rogue Planet</button>
    <button id="btnDark">&#128684; Dark Matter Web</button>
    <button id="btnVoid">&#11835; Void</button>
    <button id="btnMeteor">&#9917; Meteors</button>
    <button id="btnNebula">&#9729; Nebula</button>
    <button id="btnWorm">&#9399; Wormhole</button>
    <button id="btnClear">&#10005; Clear</button>
    <button id="btnPause" class="on">&#9646;&#9646; Pause</button>
  </div>
  <div class="row">
    <button id="btnMode">spawn: matter</button>
    <button id="btnTrails" class="on">trails: on</button>
    <button id="btnGrid">grid: off</button>
    <button id="btnDarkE">dark energy: off</button>
    <button id="btnRel">relativity: off</button>
    <button id="btnElastic">elastic: off</button>
    &nbsp;
    <label style="color:#456">G</label> <input id="sG" type="range" min="0.1" max="8" step="0.1" value="1.5"> <span class="val" id="vG">1.5</span>
    <label style="color:#456">drag</label> <input id="sDr" type="range" min="0" max="80" step="1" value="3"> <span class="val" id="vDr">3</span>
    <label style="color:#456">size</label> <input id="sSz" type="range" min="2" max="22" step="1" value="5"> <span class="val" id="vSz">5</span>
    <label style="color:#456">speed</label> <input id="sSp" type="range" min="1" max="6" step="1" value="1"> <span class="val" id="vSp">1</span>
    <label style="color:#456">trails</label> <input id="sTr" type="range" min="2" max="40" step="1" value="14"> <span class="val" id="vTr">14</span>
    <label style="color:#456">zoom</label> <input id="sZm" type="range" min="20" max="300" step="5" value="100"> <span class="val" id="vZm">100</span>%
  </div>
  <div class="row" style="font-size:10px;color:#234;gap:7px">
    <span>&#9632;<span style="color:#4af"> matter</span></span>
    <span>&#9632;<span style="color:#f94"> antimatter</span></span>
    <span>&#9632;<span style="color:#ff3"> star</span></span>
    <span>&#9632;<span style="color:#f72"> giant</span></span>
    <span>&#9632;<span style="color:#f33"> black hole</span></span>
    <span>&#9632;<span style="color:#cff"> neutron</span></span>
    <span>&#9632;<span style="color:#b6f"> magnetar</span></span>
    <span>&#9632;<span style="color:#fdf"> white dwarf</span></span>
    <span>&#9632;<span style="color:#4d8"> planet</span></span>
    <span>&#9632;<span style="color:#da8"> comet</span></span>
    <span>&#9632;<span style="color:#66e"> dark matter</span></span>
    <span>&#9632;<span style="color:#228"> void</span></span>
    <span>&#9632;<span style="color:#ff8"> quasar</span></span>
    <span>&#9632;<span style="color:#f5f"> wormhole</span></span>
    <span style="color:#234">drag=launch &nbsp; right-drag=attract &nbsp; scroll=zoom &nbsp; click=inspect</span>
  </div>
</div>
<script>
var cv=document.getElementById('c'),ctx=cv.getContext('2d'),uiEl=document.getElementById('ui');
var W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight-uiEl.offsetHeight;}
window.addEventListener('resize',resize);

var G=1.5,DRAG=0.00003,spawnSz=5,simSpd=1,trailLen=14,zoom=1;
var showTrails=true,showGrid=false,useDarkE=false,useRel=false,useElastic=false,paused=false;
var MODES=['matter','antimatter','star','giant','blackhole','neutron','magnetar','whitedwarf','planet','comet','darkmatter','void','quasar','wormhole'];
var modeI=0,spawnMode='matter';

// ── BODY TYPES ────────────────────────────────────────────────
var TD={
  matter:     {col:'#4af',mass:1,   br:4,  name:'Matter'},
  antimatter: {col:'#f94',mass:1,   br:4,  name:'Antimatter'},
  star:       {col:'#ff3',mass:5,   br:7,  name:'Star'},
  giant:      {col:'#f72',mass:12,  br:11, name:'Giant Star'},
  blackhole:  {col:'#f33',mass:50,  br:14, name:'Black Hole'},
  neutron:    {col:'#cff',mass:20,  br:6,  name:'Neutron Star'},
  magnetar:   {col:'#b6f',mass:22,  br:6,  name:'Magnetar'},
  whitedwarf: {col:'#fdf',mass:8,   br:5,  name:'White Dwarf'},
  planet:     {col:'#4d8',mass:2,   br:5,  name:'Planet'},
  comet:      {col:'#da8',mass:0.5, br:3,  name:'Comet'},
  darkmatter: {col:'#66e',mass:30,  br:8,  name:'Dark Matter'},
  void:       {col:'#228',mass:60,  br:16, name:'Void'},
  quasar:     {col:'#ff8',mass:80,  br:18, name:'Quasar'},
  wormhole:   {col:'#f5f',mass:0,   br:13, name:'Wormhole'},
};

// ── INTERACTION MATRIX ────────────────────────────────────────
// same+same always = 'merge' (handled specially for each pair)
// returns: 'merge','anni','eat','explode','bounce','fragment','absorb','nova','charge','repel'
var IX={
  'matter+antimatter':   'anni',
  'matter+star':         'eat',
  'matter+giant':        'eat',
  'matter+blackhole':    'eat',
  'matter+neutron':      'eat',
  'matter+magnetar':     'charge',   // magnetar charges matter, flings it away magnetized
  'matter+whitedwarf':   'eat',
  'matter+planet':       'merge',
  'matter+comet':        'merge',
  'matter+darkmatter':   'bounce',
  'matter+void':         'absorb',   // void slowly drains matter
  'matter+quasar':       'eat',
  'antimatter+star':     'anni',
  'antimatter+giant':    'nova',     // giant antimatter hit = hypernova
  'antimatter+blackhole':'eat',
  'antimatter+neutron':  'anni',
  'antimatter+magnetar': 'anni',
  'antimatter+whitedwarf':'anni',
  'antimatter+planet':   'explode',
  'antimatter+comet':    'anni',
  'antimatter+darkmatter':'bounce',
  'antimatter+void':     'absorb',
  'antimatter+quasar':   'nova',
  'star+giant':          'eat',
  'star+blackhole':      'eat',
  'star+neutron':        'nova',     // kilonova
  'star+magnetar':       'nova',
  'star+whitedwarf':     'nova',     // type 1a supernova!
  'star+planet':         'eat',
  'star+comet':          'eat',
  'star+darkmatter':     'bounce',
  'star+void':           'absorb',
  'star+quasar':         'eat',
  'giant+blackhole':     'eat',
  'giant+neutron':       'nova',
  'giant+magnetar':      'nova',
  'giant+whitedwarf':    'nova',
  'giant+planet':        'eat',
  'giant+comet':         'eat',
  'giant+darkmatter':    'bounce',
  'giant+void':          'absorb',
  'giant+quasar':        'eat',
  'blackhole+neutron':   'eat',
  'blackhole+magnetar':  'eat',
  'blackhole+whitedwarf':'eat',
  'blackhole+planet':    'eat',
  'blackhole+comet':     'eat',
  'blackhole+darkmatter':'eat',
  'blackhole+void':      'merge',    // black hole + void = super black hole
  'blackhole+quasar':    'merge',
  'neutron+magnetar':    'merge',
  'neutron+whitedwarf':  'eat',
  'neutron+planet':      'eat',
  'neutron+comet':       'eat',
  'neutron+darkmatter':  'bounce',
  'neutron+void':        'absorb',
  'neutron+quasar':      'eat',
  'magnetar+whitedwarf': 'eat',
  'magnetar+planet':     'charge',   // flings planet away magnetically
  'magnetar+comet':      'fragment', // magnetar tears comets apart
  'magnetar+darkmatter': 'repel',    // magnetar repels dark matter
  'magnetar+void':       'absorb',
  'magnetar+quasar':     'eat',
  'whitedwarf+planet':   'eat',
  'whitedwarf+comet':    'eat',
  'whitedwarf+darkmatter':'bounce',
  'whitedwarf+void':     'absorb',
  'whitedwarf+quasar':   'eat',
  'planet+comet':        'merge',
  'planet+darkmatter':   'bounce',
  'planet+void':         'absorb',
  'planet+quasar':       'eat',
  'comet+comet':         'merge',
  'comet+darkmatter':    'bounce',
  'comet+void':          'absorb',
  'comet+quasar':        'eat',
  'darkmatter+void':     'repel',
  'darkmatter+quasar':   'eat',
  'void+quasar':         'merge',    // void + quasar = mega void
};

function getIX(ta,tb){
  if(ta===tb)return'same';
  return IX[ta+'+'+tb]||IX[tb+'+'+ta]||'merge';
}

var bodies=[],parts=[],nebs=[],worms=[],bgStars=[],bgGals=[];
var T=0,nMerge=0,nAnni=0,nEat=0,nNova=0,uid=0;
var dragStart=null,dragNow=null,attractPt=null,selected=null;
var fpsC=0,fpsT=0,lastFps=0;
var elog=[],elogTimer=0;

function rnd(a,b){return a+Math.random()*(b-a);}
function rndI(a,b){return Math.floor(a+Math.random()*(b-a+1));}
function log(msg,col){elog.unshift({msg:msg,col:col||'#9cf',t:120});if(elog.length>5)elog.pop();}

function mkB(x,y,vx,vy,type,r){
  var T2=TD[type]||TD.matter;
  r=r!=null?r:rnd(T2.br*0.6,T2.br*1.5);
  return{id:uid++,x:x,y:y,vx:vx||0,vy:vy||0,type:type,r:r,
    mass:T2.mass*(1+r*r*0.04),col:T2.col,
    trail:[],age:0,alive:true,spin:rnd(-0.07,0.07),ang:0,
    temp:type==='star'?rnd(4000,26000):type==='giant'?rnd(20000,42000):type==='quasar'?rnd(50000,200000):300,
    lum:(type==='star'||type==='giant'||type==='quasar')?rnd(0.5,1):0,
    pC:0,charged:false,chargeTimer:0};
}

function initBg(){
  bgStars=[];
  for(var i=0;i<500;i++)
    bgStars.push({x:Math.random(),y:Math.random(),r:rnd(0.3,2),a:rnd(0.1,1),ph:rnd(0,6.28),spd:rnd(0.005,0.04),
      col:Math.random()<0.07?'#fda':Math.random()<0.07?'#adf':Math.random()<0.05?'#faa':'#fff'});
  bgGals=[];
  for(var j=0;j<8;j++)
    bgGals.push({x:rnd(0.05,0.95),y:rnd(0.05,0.95),sz:rnd(15,55),ang:rnd(0,6.28),arms:rndI(2,5),col:'hsl('+rndI(180,300)+',45%,55%)',a:rnd(0.03,0.07)});
}

// ── PARTICLE HELPERS ──────────────────────────────────────────
function burst(x,y,n,spd,col,life,rng){
  for(var i=0;i<n;i++){
    var a=Math.random()*6.28,s=rnd(spd*0.3,spd);
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life||1,col:col||'#fff',r:rng||rnd(1,4),type:'p'});
  }
}
function wave(x,y,col,maxR){parts.push({x:x,y:y,vx:0,vy:0,life:1,col:col||'#fa8',r:5,type:'wave',maxR:maxR||120});}
function flash(x,y,col,r){parts.push({x:x,y:y,vx:0,vy:0,life:1,col:col||'#fff',r:r||20,type:'flash'});}
function beam(x,y,ang,col){for(var k=0;k<14;k++)parts.push({x:x+Math.cos(ang)*k*10,y:y+Math.sin(ang)*k*10,vx:Math.cos(ang)*5,vy:Math.sin(ang)*5,life:0.7,col:col||'#ff8',r:2,type:'p'});}
function addNeb(x,y,r,hue,op){nebs.push({x:x,y:y,r:r||rnd(40,100),maxR:rnd(140,260),hue:hue||rndI(180,330),op:op||rnd(0.06,0.13)});}

// ── COLLISION HANDLERS ────────────────────────────────────────
function doMergeSame(a,b){
  var tm=a.mass+b.mass;
  var nx=(a.x*a.mass+b.x*b.mass)/tm,ny=(a.y*a.mass+b.y*b.mass)/tm;
  var nvx=(a.vx*a.mass+b.vx*b.mass)/tm,nvy=(a.vy*a.mass+b.vy*b.mass)/tm;
  var nr=Math.min(Math.cbrt(a.r*a.r*a.r+b.r*b.r*b.r),42);
  var type=a.type;
  // size-based upgrades
  if(type==='matter'&&nr>6)type='planet';
  if(type==='planet'&&nr>10)type='star';
  if(type==='star'&&nr>14){type='giant';}
  if(type==='giant'&&nr>20){type='blackhole';log('Star collapse → Black Hole!','#f84');burst(nx,ny,60,10,'#f84',1.3,4);wave(nx,ny,'#f84',180);addNeb(nx,ny,60,25,0.12);}
  if(type==='comet'&&nr>8)type='planet';
  if(type==='whitedwarf'&&nr>12){type='neutron';log('White Dwarf collapse → Neutron Star!','#cff');}
  if(type==='neutron'&&nr>18){type='blackhole';log('Neutron Star collapse → Black Hole!','#f84');}
  if(type==='magnetar'&&nr>18){type='blackhole';log('Magnetar collapse → Black Hole!','#f84');}
  if(type==='blackhole'&&a.type==='blackhole'){log('Black Hole merger! Gravity wave!','#f84');wave(nx,ny,'#f84',220);burst(nx,ny,40,9,'#f84');}
  if(type==='void')log('Void grows...','#228');
  if(type==='quasar'){log('Quasar merger — mega jet!','#ff8');for(var q=0;q<4;q++)beam(nx,ny,q*1.5708,'#ff8');}
  if(type==='planet')burst(nx,ny,20,5,'#8a6',0.8,3);
  if(type==='star')burst(nx,ny,30,6,'#ff8',0.9,3);
  a.alive=false;b.alive=false;nMerge++;
  var nb=mkB(nx,ny,nvx,nvy,type,nr);
  nb.mass=Math.min(tm,2000);
  nb.temp=((a.temp||300)*(a.mass)+(b.temp||300)*(b.mass))/tm;
  bodies.push(nb);
}

function doMerge(a,b){
  var tm=a.mass+b.mass;
  var nx=(a.x*a.mass+b.x*b.mass)/tm,ny=(a.y*a.mass+b.y*b.mass)/tm;
  var nvx=(a.vx*a.mass+b.vx*b.mass)/tm,nvy=(a.vy*a.mass+b.vy*b.mass)/tm;
  var nr=Math.min(Math.cbrt(a.r*a.r*a.r+b.r*b.r*b.r),42);
  var type=a.mass>=b.mass?a.type:b.type;
  if(type!=='blackhole'&&type!=='void'&&type!=='quasar'){
    if(nr>22)type='blackhole';
    else if(nr>16)type='neutron';
    else if(nr>12)type='giant';
  }
  a.alive=false;b.alive=false;nMerge++;
  var nb=mkB(nx,ny,nvx,nvy,type,nr);
  nb.mass=Math.min(tm,2000);
  bodies.push(nb);
}

function doAnni(a,b){
  var nx=(a.x+b.x)/2,ny=(a.y+b.y)/2;
  a.alive=false;b.alive=false;nAnni++;
  burst(nx,ny,60,11,'#fff',1.2);burst(nx,ny,30,7,'#aef');wave(nx,ny,'#fff',160);
  for(var i=0;i<4;i++)beam(nx,ny,i*1.5708+0.7,'#fff');
  for(var j=0;j<5;j++){var a2=Math.random()*6.28,s=rnd(1,5);var nb3=mkB(nx,ny,Math.cos(a2)*s,Math.sin(a2)*s,'star',rnd(2,5));nb3.grace=40;bodies.push(nb3);}
  log('Annihilation! Matter→Energy→Stars','#fff');
}

function doEat(eater,prey){
  prey.alive=false;nEat++;
  var nr=Math.cbrt(eater.r*eater.r*eater.r+prey.r*prey.r*prey.r*0.35);
  eater.r=Math.min(nr,42);
  eater.mass=Math.min(eater.mass+prey.mass*0.6,2000);
  eater.vx=(eater.vx*eater.mass+prey.vx*prey.mass*0.3)/(eater.mass+prey.mass*0.3);
  eater.vy=(eater.vy*eater.mass+prey.vy*prey.mass*0.3)/(eater.mass+prey.mass*0.3);
  burst(prey.x,prey.y,10,3,eater.col,0.6,2);
  if(eater.type==='star'&&eater.r>15){eater.type='giant';eater.col=TD.giant.col;log('Star → Giant!','#f72');}
  if(eater.type==='giant'&&eater.r>22){eater.type='blackhole';eater.col=TD.blackhole.col;burst(eater.x,eater.y,50,9,'#f84',1.2);wave(eater.x,eater.y,'#f84',160);log('Giant collapse → Black Hole!','#f84');addNeb(eater.x,eater.y,60,25,0.1);}
  if(eater.type==='void'&&eater.r>30)log('The Void expands...','#228');
  if(eater.type==='quasar'&&eater.r>30){log('Quasar erupts!','#ff8');for(var q=0;q<6;q++)beam(eater.x,eater.y,q*1.047,'#ff8');}
}

function doNova(a,b){
  var nx=(a.x+b.x)/2,ny=(a.y+b.y)/2;
  a.alive=false;b.alive=false;nNova++;nMerge++;
  burst(nx,ny,90,12,'#f84',1.4);burst(nx,ny,50,7,'#fff');burst(nx,ny,30,5,'#ff4');
  wave(nx,ny,'#f84',200);wave(nx,ny,'#fff',100);
  addNeb(nx,ny,60,rndI(10,50),0.12);
  var novaCount=Math.min(25,Math.max(8,Math.floor(400/Math.max(bodies.length,1))));
  for(var i=0;i<novaCount;i++){var a2=(i/novaCount)*6.28+rnd(-0.2,0.2),s=rnd(3,9);var nb2=mkB(nx,ny,Math.cos(a2)*s,Math.sin(a2)*s,Math.random()<0.1?'neutron':Math.random()<0.25?'star':'matter',rnd(2,6));nb2.grace=60;bodies.push(nb2);}
  // neutron+star kilonova: eject gold
  if((a.type==='neutron'&&b.type==='star')||(a.type==='star'&&b.type==='neutron')||(a.type==='neutron'&&b.type==='giant')||(a.type==='giant'&&b.type==='neutron')){
    log('Kilonova — gold & platinum formed!','#fd4');
    burst(nx,ny,15,8,'#fd4',1.5,4);
  } else if((a.type==='star'&&b.type==='whitedwarf')||(a.type==='whitedwarf'&&b.type==='star')){
    log('Type Ia Supernova!','#fff');
  } else if((a.type==='antimatter'&&b.type==='giant')||(a.type==='giant'&&b.type==='antimatter')){
    log('Hypernova!','#f72');
    burst(nx,ny,35,12,'#f72',1.6);wave(nx,ny,'#f72',280);addNeb(nx,ny,80,25,0.14);
  } else {
    log('Stellar explosion!','#f84');
  }
}

function doExplode(a,b){
  var nx=(a.x+b.x)/2,ny=(a.y+b.y)/2;
  a.alive=false;b.alive=false;nMerge++;
  burst(nx,ny,50,9,'#f84',1.1);burst(nx,ny,20,5,'#fff');wave(nx,ny,'#f84',130);
  for(var i=0;i<6;i++){var a2=Math.random()*6.28,s=rnd(2,7);var nb4=mkB(nx,ny,Math.cos(a2)*s,Math.sin(a2)*s,'matter',rnd(2,5));nb4.grace=30;bodies.push(nb4);}
  log('Explosive collision!','#f84');
}

function doBounce(a,b){
  var dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+0.001;
  var nx2=dx/d,ny2=dy/d;
  var dvx=a.vx-b.vx,dvy=a.vy-b.vy,dot=dvx*nx2+dvy*ny2;
  if(dot>0){
    var imp=2*dot/(a.mass+b.mass);
    a.vx-=imp*b.mass*nx2;a.vy-=imp*b.mass*ny2;
    b.vx+=imp*a.mass*nx2;b.vy+=imp*a.mass*ny2;
  }
  var ov=(a.r+b.r-d)*0.5+0.5;
  a.x-=nx2*ov;a.y-=ny2*ov;b.x+=nx2*ov;b.y+=ny2*ov;
  burst((a.x+b.x)/2,(a.y+b.y)/2,5,2,'#8af',0.5,2);
}

function doAbsorb(absorber,victim){
  // void/quasar slowly pulls mass from victim without killing it instantly
  victim.mass*=0.85;victim.r*=0.93;
  absorber.mass=Math.min(absorber.mass+victim.mass*0.1,2000);
  absorber.r=Math.min(Math.cbrt(absorber.r*absorber.r*absorber.r+victim.r*victim.r*victim.r*0.1),42);
  parts.push({x:victim.x,y:victim.y,vx:(absorber.x-victim.x)*0.05,vy:(absorber.y-victim.y)*0.05,life:0.8,col:'#228',r:2,type:'p'});
  if(victim.mass<0.5||victim.r<1){victim.alive=false;nEat++;}
}

function doCharge(magnetar,body){
  // magnetar flings body away with huge velocity
  var dx=body.x-magnetar.x,dy=body.y-magnetar.y;
  var d=Math.sqrt(dx*dx+dy*dy)+1;
  var force=rnd(8,16);
  body.vx+=dx/d*force;body.vy+=dy/d*force;
  body.charged=true;body.chargeTimer=40;
  burst(body.x,body.y,12,4,'#b6f',0.7,2);
  // also shrink the flung body a bit (magnetar strips its outer layers)
  body.r=Math.max(body.r*0.85,1);body.mass*=0.85;
  log('Magnetar charge burst!','#b6f');
}

function doRepel(a,b){
  var dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+1;
  var force=8/d;
  a.vx-=dx/d*force;a.vy-=dy/d*force;
  b.vx+=dx/d*force;b.vy+=dy/d*force;
  burst((a.x+b.x)/2,(a.y+b.y)/2,4,3,'#66e',0.4,2);
}

function doFragment(a,b){
  // magnetar tears comet apart
  var nx=(a.x+b.x)/2,ny=(a.y+b.y)/2;
  b.alive=false;nEat++;
  burst(nx,ny,20,5,'#da8',0.8,2);
  for(var i=0;i<6;i++){var a2=Math.random()*6.28,s=rnd(2,5);bodies.push(mkB(nx,ny,Math.cos(a2)*s,Math.sin(a2)*s,'comet',rnd(1,3)));}
  log('Magnetar tears comet apart!','#b6f');
}

// ── COLLISION DISPATCH ────────────────────────────────────────
function collide(a,b){
  var ix=getIX(a.type,b.type);
  if(ix==='same'){doMergeSame(a,b);return;}
  switch(ix){
    case'merge':   doMerge(a,b);break;
    case'anni':    doAnni(a,b);break;
    case'eat':     if(a.mass>=b.mass)doEat(a,b);else doEat(b,a);break;
    case'nova':    doNova(a,b);break;
    case'explode': doExplode(a,b);break;
    case'bounce':  doBounce(a,b);break;
    case'absorb':
      var absorber=(a.type==='void'||a.type==='quasar')?a:b;
      var victim=(absorber===a)?b:a;
      doAbsorb(absorber,victim);break;
    case'charge':
      var mag=(a.type==='magnetar')?a:b;
      var other=(mag===a)?b:a;
      doCharge(mag,other);break;
    case'repel':   doRepel(a,b);break;
    case'fragment':
      var fmag=(a.type==='magnetar')?a:b;
      var fcom=(fmag===a)?b:a;
      doFragment(fmag,fcom);break;
    default:       doMerge(a,b);
  }
  // elastic override
  if(useElastic&&ix!=='anni'&&ix!=='nova'&&ix!=='absorb'&&a.alive&&b.alive)doBounce(a,b);
}

// ── STEP ──────────────────────────────────────────────────────
function step(){
  if(bodies.length>600){bodies.splice(0,bodies.length-600);}
  var alive=[],i;
  for(i=0;i<bodies.length;i++)if(bodies[i].alive)alive.push(bodies[i]);

  for(i=0;i<alive.length;i++){
    var a=alive[i];if(!a.alive)continue;
    var ax=0,ay=0;
    for(var j=i+1;j<alive.length;j++){
      var b=alive[j];if(!b.alive)continue;
      var dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy;
      var td=a.r+b.r;

      if(d2<td*td){
        if((a.grace&&a.grace>0)||(b.grace&&b.grace>0)){doBounce(a,b);continue;}
        collide(a,b);
        if(!a.alive)break;
        continue;
      }

      var d=Math.sqrt(d2);
      var f=G*b.mass/(d2+40);
      if(useRel)f/=(1-Math.min(0.9,(a.vx*a.vx+a.vy*a.vy)/90000));

      // void has negative gravity at range (repels things far away, sucks close)
      if(b.type==='void'&&d>b.r*3){f*=-0.3;}
      // quasar jets: perpendicular force on passing bodies
      if(b.type==='quasar'&&d<b.r*6){
        var jf=0.02*b.mass/(d2+40);
        ax+=jf*(-dy/d);ay+=jf*(dx/d);
      }
      // magnetar: extra force on charged bodies
      if(a.charged&&b.type==='magnetar'){f*=2;}

      var gx=f*dx/d,gy=f*dy/d;
      ax+=gx;ay+=gy;
      b.vx-=f*a.mass/(b.mass)*dx/d*0.5;
      b.vy-=f*a.mass/(b.mass)*dy/d*0.5;
    }

    if(!a.alive)continue;
    if(useDarkE){ax+=0.00004*(a.x-W/2);ay+=0.00004*(a.y-H/2);}
    if(attractPt){var dx2=attractPt.x-a.x,dy2=attractPt.y-a.y,dd=Math.sqrt(dx2*dx2+dy2*dy2)+1;ax+=6*G*dx2/(dd*dd);ay+=6*G*dy2/(dd*dd);}
    var fr=(a.type==='blackhole'||a.type==='void')?DRAG*4:DRAG;
    a.vx=(a.vx+ax)*(1-fr);a.vy=(a.vy+ay)*(1-fr);
    if((a.type==='blackhole'||a.type==='void')&&Math.sqrt(a.vx*a.vx+a.vy*a.vy)>2.5){var sp=Math.sqrt(a.vx*a.vx+a.vy*a.vy);a.vx*=2.5/sp;a.vy*=2.5/sp;}
  }

  for(i=0;i<alive.length;i++){
    var b2=alive[i];if(!b2.alive)continue;
    b2.x+=b2.vx;b2.y+=b2.vy;b2.ang+=b2.spin;b2.age++;b2.pC++;
    if(b2.chargeTimer>0)b2.chargeTimer--;else b2.charged=false;
    if(b2.grace&&b2.grace>0)b2.grace--;
    b2.trail.push({x:b2.x,y:b2.y});
    if(b2.trail.length>trailLen)b2.trail.shift();

    // magnetar beam pulses
    if(b2.type==='magnetar'&&b2.pC%25===0){for(var s=0;s<2;s++){var pa=b2.ang+s*3.14159;for(var k=0;k<10;k++)parts.push({x:b2.x+Math.cos(pa)*k*11,y:b2.y+Math.sin(pa)*k*11,vx:Math.cos(pa)*5,vy:Math.sin(pa)*5,life:0.7,col:'#b6f',r:2.5,type:'p'});}}
    // quasar jets
    if(b2.type==='quasar'&&b2.pC%15===0){for(var qj=0;qj<2;qj++){var qa=b2.ang+qj*3.14159;for(var qk=0;qk<8;qk++)parts.push({x:b2.x+Math.cos(qa)*qk*14,y:b2.y+Math.sin(qa)*qk*14,vx:Math.cos(qa)*7,vy:Math.sin(qa)*7,life:0.9,col:'#ff8',r:3,type:'p'});}}
    // comet tail
    if(b2.type==='comet'&&b2.pC%3===0){var spd=Math.sqrt(b2.vx*b2.vx+b2.vy*b2.vy);if(spd>0.5){var ta=-Math.atan2(b2.vy,b2.vx);parts.push({x:b2.x,y:b2.y,vx:Math.cos(ta)*rnd(0.5,1.5),vy:Math.sin(ta)*rnd(0.5,1.5),life:0.7,col:'#ffe',r:rnd(1,2.5),type:'p'});}}
    // void drain particles
    if(b2.type==='void'&&b2.pC%8===0){var va=Math.random()*6.28;parts.push({x:b2.x+Math.cos(va)*b2.r*1.5,y:b2.y+Math.sin(va)*b2.r*1.5,vx:-Math.cos(va)*0.5,vy:-Math.sin(va)*0.5,life:0.6,col:'#228',r:2,type:'p'});}

    var M=80;
    if(b2.x<-M){b2.x=-M;b2.vx=Math.abs(b2.vx)*0.4;}
    if(b2.x>W+M){b2.x=W+M;b2.vx=-Math.abs(b2.vx)*0.4;}
    if(b2.y<-M){b2.y=-M;b2.vy=Math.abs(b2.vy)*0.4;}
    if(b2.y>H+M){b2.y=H+M;b2.vy=-Math.abs(b2.vy)*0.4;}

    for(var wi=0;wi<worms.length;wi++){
      var w=worms[wi];if(!w.partner)continue;
      var wdx=b2.x-w.x,wdy=b2.y-w.y;
      if(wdx*wdx+wdy*wdy<w.r*w.r){b2.x=w.partner.x+rnd(-8,8);b2.y=w.partner.y+rnd(-8,8);b2.vx*=-0.6;b2.vy*=-0.6;flash(w.partner.x,w.partner.y,'#f5f',18);}
    }
  }

  for(var pi=parts.length-1;pi>=0;pi--){
    var p=parts[pi];
    if(p.type==='wave'){p.r+=p.maxR*0.025;p.life-=0.022;if(p.life<=0)parts.splice(pi,1);continue;}
    if(p.type==='flash'){p.r*=0.84;p.life-=0.07;if(p.life<=0)parts.splice(pi,1);continue;}
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.r*=0.97;p.life-=0.022;
    if(p.life<=0||p.r<0.1)parts.splice(pi,1);
  }
  for(var ni=0;ni<nebs.length;ni++){var n=nebs[ni];if(n.r<n.maxR)n.r+=0.1;}
  for(var wii=0;wii<worms.length;wii++){worms[wii].ang+=0.06;worms[wii].pulse=(worms[wii].pulse||0)+0.1;}
  var nb2=[];for(i=0;i<bodies.length;i++)if(bodies[i].alive)nb2.push(bodies[i]);bodies=nb2;
  for(var ei=elog.length-1;ei>=0;ei--){elog[ei].t--;if(elog[ei].t<=0)elog.splice(ei,1);}
  if(elog.length){document.getElementById('elog').innerHTML=elog.slice(0,3).map(function(e){return'<span style="color:'+e.col+'">'+e.msg+'</span>';}).join(' | ');}
  else document.getElementById('elog').innerHTML='';
  T++;
}

// ── SPAWNERS ─────────────────────────────────────────────────
function bigBang(){
  bodies=[];parts=[];nebs=[];worms=[];nMerge=0;nAnni=0;nEat=0;nNova=0;T=0;selected=null;
  var cx=W/2,cy=H/2;
  var pool=['matter','matter','matter','matter','matter','star','star','star','antimatter','antimatter','planet','planet','comet','comet','darkmatter','whitedwarf'];
  for(var i=0;i<140;i++){var a=Math.random()*6.28,s=rnd(0.5,6);bodies.push(mkB(cx+rnd(-18,18),cy+rnd(-18,18),Math.cos(a)*s,Math.sin(a)*s,pool[rndI(0,pool.length-1)]));}
  bodies.push(mkB(cx,cy,0,0,'blackhole',18));
  nebs.push({x:cx,y:cy,r:70,maxR:220,hue:260,op:0.08});
  burst(cx,cy,100,8,'#fff',1.2);wave(cx,cy,'#fff',250);
  log('The Big Bang!','#fff');
}

function spawnGalaxy(){
  var gx=rnd(W*0.2,W*0.8),gy=rnd(H*0.2,H*0.8);
  var arms=rndI(2,6),sp=(Math.random()<0.5?1:-1)*rnd(0.015,0.08);
  var pool=['matter','matter','matter','star','star','planet','comet','darkmatter','whitedwarf'];
  for(var i=0;i<120;i++){
    var arm=i%arms,t=rnd(0.05,1),a=(arm/arms)*6.28+t*10+rnd(-0.15,0.15),dist=t*Math.min(W,H)*0.2;
    var x=gx+Math.cos(a)*dist+rnd(-6,6),y=gy+Math.sin(a)*dist+rnd(-6,6);
    var vt=Math.sqrt(Math.max(0,G*35/Math.max(dist,10)))*0.55;
    bodies.push(mkB(x,y,-Math.sin(a)*vt*Math.sign(sp),Math.cos(a)*vt*Math.sign(sp),pool[rndI(0,pool.length-1)]));
  }
  bodies.push(mkB(gx,gy,0,0,'blackhole',20));
  nebs.push({x:gx,y:gy,r:rnd(60,120),maxR:rnd(180,280),hue:rndI(180,330),op:rnd(0.05,0.1)});
}

function galaxyCollision(){
  var offset=Math.min(W,H)*0.22,a=Math.random()*6.28;
  var cx=W/2,cy=H/2,speed=rnd(0.8,1.8);
  var pool=['matter','matter','star','star','planet','comet','whitedwarf'];
  for(var gi=0;gi<2;gi++){
    var gx=cx+Math.cos(a+(gi?3.14:0))*offset,gy=cy+Math.sin(a+(gi?3.14:0))*offset;
    var tvx=(cx-gx)/offset*speed,tvy=(cy-gy)/offset*speed;
    var arms=rndI(2,4),sp=(gi===0?1:-1)*rnd(0.02,0.07);
    for(var i=0;i<70;i++){
      var arm=i%arms,t=rnd(0.1,1),ang=(arm/arms)*6.28+t*8,dist=t*Math.min(W,H)*0.14;
      var x=gx+Math.cos(ang)*dist+rnd(-5,5),y=gy+Math.sin(ang)*dist+rnd(-5,5);
      var vt=Math.sqrt(Math.max(0,G*30/Math.max(dist,10)))*0.5;
      bodies.push(mkB(x,y,tvx-Math.sin(ang)*vt*Math.sign(sp),tvy+Math.cos(ang)*vt*Math.sign(sp),pool[rndI(0,pool.length-1)]));
    }
    bodies.push(mkB(gx,gy,tvx,tvy,'blackhole',18));
    nebs.push({x:gx,y:gy,r:50,maxR:200,hue:gi===0?220:40,op:0.08});
  }
  log('Galaxy collision!','#fa0');
}

function spawnNova(){
  var b=bodies.length?bodies[rndI(0,bodies.length-1)]:null;
  var x=b?b.x:W/2,y=b?b.y:H/2;
  if(b)b.alive=false;
  doNova({x:x,y:y,type:'star',mass:10},{x:x,y:y,type:'star',mass:10});
}

function spawnVoid(){bodies.push(mkB(W/2+rnd(-60,60),H/2+rnd(-60,60),rnd(-0.3,0.3),rnd(-0.3,0.3),'void',16));log('A void forms...','#228');}

function spawnComets(){

function spawnRogue(){
  var edge=rndI(0,3),x,y,vx,vy;
  if(edge===0){x=rnd(0,W);y=-10;vx=rnd(-2,2);vy=rnd(3,7);}
  else if(edge===1){x=W+10;y=rnd(0,H);vx=rnd(-7,-3);vy=rnd(-2,2);}

  else{x=-10;y=rnd(0,H);vx=rnd(3,7);vy=rnd(-2,2);}

}

function spawnDarkWeb(){
  // dark matter filament: chain of dark matter nodes
  var x=rnd(80,W-80),y=rnd(80,H-80);
  var ang=Math.random()*6.28,len=rndI(8,16);
  for(var i=0;i<len;i++){
    var dx=Math.cos(ang+rnd(-0.3,0.3))*rnd(30,60),dy=Math.sin(ang+rnd(-0.3,0.3))*rnd(30,60);

  }
  log('Dark matter filament!','#66e');
}

function spawnMeteors(){
  var fl=Math.random()<0.5;
  for(var i=0;i<18;i++){
    var x=fl?-20:W+20,y=rnd(20,H-20),vx=fl?rnd(4,9):rnd(-9,-4),vy=rnd(-2,2);

// ── DRAW ──────────────────────────────────────────────────────
function tCol(t){return t<3000?'#f60':t<5500?'#ff4':t<9000?'#fff':t<25000?'#cdf':t<80000?'#9cf':'#f9f';}

function draw(){
  ctx.fillStyle='#000012';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(W/2,H/2);ctx.scale(zoom,zoom);ctx.translate(-W/2,-H/2);

  // bg galaxies
  for(var gi=0;gi<bgGals.length;gi++){
    var g=bgGals[gi];ctx.fillStyle=g.col;ctx.globalAlpha=g.a;
    for(var ai=0;ai<g.arms;ai++)for(var ti=0;ti<28;ti++){var t=ti/28,ang=g.ang+(ai/g.arms)*6.28+t*8,dist=t*g.sz;ctx.beginPath();ctx.arc(g.x*W+Math.cos(ang)*dist,g.y*H+Math.sin(ang)*dist,g.sz*0.04*(1-t)+0.4,0,6.28);ctx.fill();}
  }
  ctx.globalAlpha=1;

  // bg stars
  for(var si=0;si<bgStars.length;si++){
    var s=bgStars[si];s.ph+=s.spd;var alpha=s.a*(0.3+0.7*Math.sin(s.ph));if(alpha<0)alpha=0;
    ctx.globalAlpha=alpha;ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,6.28);ctx.fill();
  }
  ctx.globalAlpha=1;

  // grid
  if(showGrid){
    ctx.strokeStyle='rgba(40,80,180,0.13)';ctx.lineWidth=0.5;
    for(var x=0;x<W;x+=55){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(var y=0;y<H;y+=55){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    for(var bi3=0;bi3<bodies.length;bi3++){var bw=bodies[bi3];if(bw.mass<8)continue;for(var ring=1;ring<=4;ring++){ctx.strokeStyle='rgba(80,140,255,'+(Math.min(0.18,bw.mass/800)*(1-ring/5))+')';ctx.lineWidth=0.4;ctx.beginPath();ctx.arc(bw.x,bw.y,bw.mass*ring*1.5,0,6.28);ctx.stroke();}}
  }

  // nebulae
  for(var ni=0;ni<nebs.length;ni++){
    var n=nebs[ni];ctx.fillStyle='hsl('+n.hue+',65%,50%)';
    ctx.globalAlpha=n.op*0.5;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,6.28);ctx.fill();
    ctx.globalAlpha=n.op*0.3;ctx.beginPath();ctx.arc(n.x,n.y,n.r*0.6,0,6.28);ctx.fill();
    ctx.globalAlpha=n.op*0.15;ctx.beginPath();ctx.arc(n.x,n.y,n.r*0.3,0,6.28);ctx.fill();
    ctx.globalAlpha=1;
  }

  // wormholes
  for(var wi=0;wi<worms.length;wi++){
    var w=worms[wi];
    ctx.globalAlpha=0.12+0.05*Math.sin(w.pulse||0);ctx.fillStyle='#f5f';ctx.beginPath();ctx.arc(w.x,w.y,w.r*3.2,0,6.28);ctx.fill();ctx.globalAlpha=1;
    for(var ri=0;ri<3;ri++){ctx.strokeStyle='rgba(240,80,255,'+(0.7-ri*0.18)+')';ctx.lineWidth=1.5-ri*0.3;ctx.beginPath();ctx.arc(w.x,w.y,w.r*(0.5+ri*0.3),w.ang+ri,w.ang+ri+4);ctx.stroke();}
    ctx.fillStyle='#f5f';ctx.globalAlpha=0.85;ctx.beginPath();ctx.arc(w.x,w.y,w.r*0.4,0,6.28);ctx.fill();ctx.globalAlpha=1;
    if(w.partner){ctx.strokeStyle='rgba(240,80,255,0.1)';ctx.lineWidth=0.5;ctx.setLineDash([5,10]);ctx.beginPath();ctx.moveTo(w.x,w.y);ctx.lineTo(w.partner.x,w.partner.y);ctx.stroke();ctx.setLineDash([]);}
  }

  // trails
  if(showTrails)for(var ti2=0;ti2<bodies.length;ti2++){
    var bt=bodies[ti2];if(bt.trail.length<2)continue;
    ctx.strokeStyle=bt.type==='comet'?'#ffe':bt.col;ctx.lineWidth=bt.type==='comet'?1.2:0.8;ctx.globalAlpha=bt.type==='comet'?0.45:0.28;
    ctx.beginPath();ctx.moveTo(bt.trail[0].x,bt.trail[0].y);for(var tii=1;tii<bt.trail.length;tii++)ctx.lineTo(bt.trail[tii].x,bt.trail[tii].y);
    ctx.stroke();ctx.globalAlpha=1;
  }

  // particles
  for(var pi2=0;pi2<parts.length;pi2++){
    var p2=parts[pi2];
    if(p2.type==='wave'){ctx.strokeStyle=p2.col;ctx.lineWidth=2;ctx.globalAlpha=p2.life*0.45;ctx.beginPath();ctx.arc(p2.x,p2.y,p2.r,0,6.28);ctx.stroke();ctx.globalAlpha=1;continue;}
    if(p2.type==='flash'){ctx.fillStyle=p2.col;ctx.globalAlpha=p2.life*0.5;ctx.beginPath();ctx.arc(p2.x,p2.y,p2.r,0,6.28);ctx.fill();ctx.globalAlpha=1;continue;}
    ctx.globalAlpha=Math.max(0,p2.life);ctx.fillStyle=p2.col;ctx.beginPath();ctx.arc(p2.x,p2.y,Math.max(0.3,p2.r),0,6.28);ctx.fill();
  }
  ctx.globalAlpha=1;

  // bodies
  for(var bi=0;bi<bodies.length;bi++){
    var b=bodies[bi];
    if(b.type==='blackhole'){
      var fl=0.88+0.12*Math.sin(b.pC*0.08);
      ctx.fillStyle='#f84';ctx.globalAlpha=0.38*fl;ctx.beginPath();ctx.arc(b.x,b.y,b.r*2.3,0,6.28);ctx.fill();
      ctx.fillStyle='#f62';ctx.globalAlpha=0.28*fl;ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.8,0,6.28);ctx.fill();
      ctx.fillStyle='#f40';ctx.globalAlpha=0.18*fl;ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.3,0,6.28);ctx.fill();
      ctx.globalAlpha=1;ctx.fillStyle='#020008';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
      ctx.strokeStyle='#f64';ctx.lineWidth=1;ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.stroke();ctx.globalAlpha=1;
    }
    else if(b.type==='void'){
      // void: dark expanding sphere that warps space
      ctx.fillStyle='#001';ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(b.x,b.y,b.r*2.5,0,6.28);ctx.fill();
      ctx.fillStyle='#228';ctx.globalAlpha=0.4+0.1*Math.sin(b.pC*0.05);ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.5,0,6.28);ctx.fill();
      ctx.globalAlpha=1;ctx.fillStyle='#000';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
      ctx.strokeStyle='#228';ctx.lineWidth=1.5;ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.stroke();ctx.globalAlpha=1;
    }
    else if(b.type==='quasar'){
      var qf=0.85+0.15*Math.sin(b.pC*0.12);
      // quasar: super bright, jets visible
      ctx.fillStyle='#ff8';ctx.globalAlpha=0.12*qf;ctx.beginPath();ctx.arc(b.x,b.y,b.r*4,0,6.28);ctx.fill();
      ctx.fillStyle='#ff8';ctx.globalAlpha=0.2*qf;ctx.beginPath();ctx.arc(b.x,b.y,b.r*2.5,0,6.28);ctx.fill();
      ctx.fillStyle='#ff8';ctx.globalAlpha=0.4*qf;ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.4,0,6.28);ctx.fill();
      ctx.globalAlpha=1;ctx.fillStyle='#ff8';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
      // jet lines
      ctx.strokeStyle='#ff8';ctx.lineWidth=2;ctx.globalAlpha=0.4;
      for(var qj2=0;qj2<2;qj2++){var qa=b.ang+qj2*3.14159;ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x+Math.cos(qa)*b.r*3.5,b.y+Math.sin(qa)*b.r*3.5);ctx.stroke();}
      ctx.globalAlpha=1;
    }
    else if(b.type==='star'||b.type==='giant'){
      var sc=tCol(b.temp),pls=0.06+0.04*Math.sin(b.pC*0.05);
      ctx.fillStyle=sc;ctx.globalAlpha=pls;ctx.beginPath();ctx.arc(b.x,b.y,b.r*(2.5+b.lum),0,6.28);ctx.fill();
      ctx.globalAlpha=0.2;ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.6,0,6.28);ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle=sc;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
      if(b.lum>0.55){ctx.strokeStyle=sc;ctx.lineWidth=0.8;ctx.globalAlpha=0.28;for(var sp2=0;sp2<4;sp2++){var sa=b.ang+sp2*1.5708;ctx.beginPath();ctx.moveTo(b.x+Math.cos(sa)*b.r,b.y+Math.sin(sa)*b.r);ctx.lineTo(b.x+Math.cos(sa)*b.r*(2.5+b.lum*1.5),b.y+Math.sin(sa)*b.r*(2.5+b.lum*1.5));ctx.stroke();}ctx.globalAlpha=1;}
      ctx.fillStyle='#fff';ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(b.x-b.r*0.25,b.y-b.r*0.25,b.r*0.35,0,6.28);ctx.fill();ctx.globalAlpha=1;
    }
    else if(b.type==='neutron'||b.type==='magnetar'){
      var np=0.2+0.12*Math.sin(b.pC*0.18);
      ctx.fillStyle=b.col;ctx.globalAlpha=np;ctx.beginPath();ctx.arc(b.x,b.y,b.r*2.8,0,6.28);ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
      ctx.fillStyle='#fff';ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.4,0,6.28);ctx.fill();ctx.globalAlpha=1;
      if(b.type==='magnetar'){
        // magnetic field lines
        ctx.strokeStyle='#b6f';ctx.lineWidth=0.6;ctx.globalAlpha=0.3;
        for(var mf=0;mf<4;mf++){var ma=b.ang+mf*1.5708;ctx.beginPath();ctx.arc(b.x,b.y,b.r*2,ma,ma+1);ctx.stroke();}
        ctx.globalAlpha=1;
      }
    }
    else if(b.type==='whitedwarf'){
      ctx.fillStyle='#fdf';ctx.globalAlpha=0.15+0.05*Math.sin(b.pC*0.08);ctx.beginPath();ctx.arc(b.x,b.y,b.r*2,0,6.28);ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle='#fdf';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
      ctx.fillStyle='#fff';ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(b.x-b.r*0.2,b.y-b.r*0.2,b.r*0.4,0,6.28);ctx.fill();ctx.globalAlpha=1;
    }
    else if(b.type==='darkmatter'){
      ctx.strokeStyle=b.col;ctx.lineWidth=1.5;ctx.globalAlpha=0.45;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.stroke();
      ctx.globalAlpha=0.1;ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();ctx.globalAlpha=1;
    }
    else if(b.type==='comet'){
      ctx.fillStyle=b.col;ctx.globalAlpha=0.1;ctx.beginPath();ctx.arc(b.x,b.y,b.r*2,0,6.28);ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
      ctx.fillStyle='#fff';ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.35,0,6.28);ctx.fill();ctx.globalAlpha=1;
    }
    else{
      // matter, planet, wormhole, etc.
      var glowCol=b.charged?'#b6f':b.col;
      ctx.fillStyle=glowCol;ctx.globalAlpha=b.charged?0.3:0.15;ctx.beginPath();ctx.arc(b.x,b.y,b.r*2,0,6.28);ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,6.28);ctx.fill();
      ctx.fillStyle='#fff';ctx.globalAlpha=0.35;ctx.beginPath();ctx.arc(b.x-b.r*0.28,b.y-b.r*0.28,b.r*0.38,0,6.28);ctx.fill();ctx.globalAlpha=1;
    }

    // selection ring
    if(b===selected){
      ctx.strokeStyle='#ff0';ctx.lineWidth=1.5;ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(b.x,b.y,b.r+5,0,6.28);ctx.stroke();
      ctx.setLineDash([4,4]);ctx.globalAlpha=0.35;ctx.beginPath();ctx.arc(b.x,b.y,b.r+12,0,6.28);ctx.stroke();
      ctx.setLineDash([]);ctx.globalAlpha=1;
    }
  }

  if(attractPt){ctx.fillStyle='#fa0';ctx.globalAlpha=0.1;ctx.beginPath();ctx.arc(attractPt.x,attractPt.y,80,0,6.28);ctx.fill();ctx.strokeStyle='#fa0';ctx.lineWidth=1;ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(attractPt.x,attractPt.y,80,0,6.28);ctx.stroke();ctx.globalAlpha=1;}
  if(dragStart&&dragNow){
    ctx.strokeStyle='rgba(100,200,255,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(dragStart.x,dragStart.y);ctx.lineTo(dragNow.x,dragNow.y);ctx.stroke();ctx.setLineDash([]);
    ctx.strokeStyle=TD[spawnMode]?TD[spawnMode].col:'#fff';ctx.lineWidth=2;ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(dragStart.x,dragStart.y,spawnSz,0,6.28);ctx.stroke();ctx.globalAlpha=1;
  }
  ctx.restore();

  // tooltip
  if(selected&&selected.alive){
    var sx=(selected.x-W/2)*zoom+W/2,sy=(selected.y-H/2)*zoom+H/2;
    var tx=Math.min(sx+selected.r*zoom+12,W-155),ty=Math.max(sy-50,5);
    ctx.fillStyle='rgba(2,6,18,0.93)';ctx.strokeStyle='rgba(60,120,220,0.6)';ctx.lineWidth=1;ctx.beginPath();ctx.rect(tx,ty,148,118);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.fillText((TD[selected.type]||{name:selected.type}).name,tx+7,ty+15);
    ctx.fillStyle='#79a';ctx.font='10px monospace';
    var spd2=Math.sqrt(selected.vx*selected.vx+selected.vy*selected.vy);
    ctx.fillText('mass    '+selected.mass.toFixed(1),tx+7,ty+30);
    ctx.fillText('speed   '+spd2.toFixed(2),tx+7,ty+43);
    ctx.fillText('radius  '+selected.r.toFixed(1),tx+7,ty+56);
    ctx.fillText('temp    '+Math.round(selected.temp).toLocaleString()+'K',tx+7,ty+69);
    ctx.fillText('age     '+selected.age,tx+7,ty+82);
    var descs={blackhole:'eats everything',void:'absorbs & repels',quasar:'jets + eats all',magnetar:'charges & fragments',neutron:'kilonova with stars',whitedwarf:'type Ia with stars',comet:'fragments on magnetar',darkmatter:'bounces off most',giant:'hypernova with antimatter',star:'kilonova with neutron',planet:'merges with comets',matter:'annihilates antimatter',antimatter:'annihilates everything'};
    ctx.fillStyle='#568';ctx.fillText(descs[selected.type]||'',tx+7,ty+98);
    if(selected.charged){ctx.fillStyle='#b6f';ctx.fillText('MAGNETIZED!',tx+7,ty+112);}
  }
}

function updateHUD(){
  fpsC++;var now=performance.now();if(now-fpsT>500){lastFps=Math.round(fpsC*1000/(now-fpsT));fpsC=0;fpsT=now;}
  document.getElementById('hB').textContent=bodies.length;
  document.getElementById('hT').textContent=T;
  document.getElementById('hM').textContent=nMerge;
  document.getElementById('hA').textContent=nAnni;
  document.getElementById('hE').textContent=nEat;
  document.getElementById('hN').textContent=nNova;
  document.getElementById('hF').textContent=lastFps;
}

function loop(){if(!paused)for(var i=0;i<simSpd;i++)step();draw();updateHUD();requestAnimationFrame(loop);}

cv.onmousedown=function(e){
  if(e.button===2){attractPt={x:e.clientX,y:e.clientY};return;}
  var wx=(e.clientX-W/2)/zoom+W/2,wy=(e.clientY-H/2)/zoom+H/2;
  var hit=null;for(var i=0;i<bodies.length;i++){var b=bodies[i],dx=b.x-wx,dy=b.y-wy;if(dx*dx+dy*dy<(b.r+8)*(b.r+8)){hit=b;break;}}
  if(hit){selected=hit;return;}
  selected=null;dragStart={x:e.clientX,y:e.clientY};dragNow={x:e.clientX,y:e.clientY};
};
cv.onmousemove=function(e){if(dragStart)dragNow={x:e.clientX,y:e.clientY};if(attractPt)attractPt={x:e.clientX,y:e.clientY};};
cv.onmouseup=function(e){
  if(e.button===2){attractPt=null;return;}
  if(!dragStart)return;
  var wx0=(dragStart.x-W/2)/zoom+W/2,wy0=(dragStart.y-H/2)/zoom+H/2;
  var wx1=(e.clientX-W/2)/zoom+W/2,wy1=(e.clientY-H/2)/zoom+H/2;
  var vx=(wx1-wx0)*0.05,vy=(wy1-wy0)*0.05;
  if(spawnMode==='wormhole')addWorm();
  else bodies.push(mkB(wx0,wy0,vx,vy,spawnMode,spawnSz));
  dragStart=null;dragNow=null;
};
cv.onmouseleave=function(){dragStart=null;dragNow=null;attractPt=null;};
cv.oncontextmenu=function(e){e.preventDefault();};
cv.onwheel=function(e){e.preventDefault();zoom=Math.max(0.15,Math.min(5,zoom*Math.exp(-e.deltaY*0.001)));document.getElementById('sZm').value=Math.round(zoom*100);document.getElementById('vZm').textContent=Math.round(zoom*100);};

window.addEventListener('load',function(){
  resize();initBg();bigBang();loop();
  document.getElementById('btnBang').onclick=bigBang;
  document.getElementById('btnGalaxy').onclick=spawnGalaxy;
  document.getElementById('btnCollide').onclick=galaxyCollision;
  document.getElementById('btnNova').onclick=spawnNova;
  document.getElementById('btnQuasar').onclick=spawnQuasar;
  document.getElementById('btnBH').onclick=function(){bodies.push(mkB(W/2+rnd(-100,100),H/2+rnd(-100,100),rnd(-1,1),rnd(-1,1),'blackhole',15));};
  document.getElementById('btnMagnetar').onclick=spawnMagnetar;
  document.getElementById('btnWD').onclick=spawnWD;
  document.getElementById('btnComet').onclick=spawnComets;
  document.getElementById('btnRogue').onclick=spawnRogue;
  document.getElementById('btnDark').onclick=spawnDarkWeb;
  document.getElementById('btnVoid').onclick=spawnVoid;
  document.getElementById('btnMeteor').onclick=spawnMeteors;
  document.getElementById('btnNebula').onclick=addNebBtn;
  document.getElementById('btnWorm').onclick=addWorm;
  document.getElementById('btnClear').onclick=function(){bodies=[];parts=[];nebs=[];worms=[];nMerge=0;nAnni=0;nEat=0;nNova=0;T=0;selected=null;};
  document.getElementById('btnPause').onclick=function(){paused=!paused;this.textContent=paused?'&#9654; Resume':'&#9646;&#9646; Pause';this.classList.toggle('on',!paused);};
  document.getElementById('btnMode').onclick=function(){modeI=(modeI+1)%MODES.length;spawnMode=MODES[modeI];this.textContent='spawn: '+spawnMode;};
  document.getElementById('btnTrails').onclick=function(){showTrails=!showTrails;this.textContent='trails: '+(showTrails?'on':'off');this.classList.toggle('on',showTrails);};
  document.getElementById('btnGrid').onclick=function(){showGrid=!showGrid;this.textContent='grid: '+(showGrid?'on':'off');this.classList.toggle('on',showGrid);};
  document.getElementById('btnDarkE').onclick=function(){useDarkE=!useDarkE;this.textContent='dark energy: '+(useDarkE?'on':'off');this.classList.toggle('on',useDarkE);};
  document.getElementById('btnRel').onclick=function(){useRel=!useRel;this.textContent='relativity: '+(useRel?'on':'off');this.classList.toggle('on',useRel);};
  document.getElementById('btnElastic').onclick=function(){useElastic=!useElastic;this.textContent='elastic: '+(useElastic?'on':'off');this.classList.toggle('on',useElastic);};
  function sl(id,vid,cb){document.getElementById(id).oninput=function(){var v=parseFloat(this.value);document.getElementById(vid).textContent=v%1===0?v:v.toFixed(1);cb(v);};}
  sl('sG','vG',function(v){G=v;});sl('sDr','vDr',function(v){DRAG=v/100000;});
  sl('sSz','vSz',function(v){spawnSz=v;});sl('sSp','vSp',function(v){simSpd=Math.round(v);});
  sl('sTr','vTr',function(v){trailLen=Math.round(v);});sl('sZm','vZm',function(v){zoom=v/100;});
});
</script>
</body>
